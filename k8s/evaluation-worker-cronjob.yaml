apiVersion: batch/v1
kind: CronJob
metadata:
  name: evaluation-worker
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: evaluation-worker
              image: agentic-trading-platform:local
              imagePullPolicy: Never
              command: ["python", "-m", "src.services.evaluation_worker"]
              envFrom:
                - configMapRef:
                    name: app-config
                - secretRef:
                    name: app-secrets
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
