apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finbert
  template:
    metadata:
      labels:
        app: finbert
    spec:
      containers:
        - name: finbert
          image: agentic-trading-platform:local
          imagePullPolicy: Never
          command: ["uvicorn", "src.services.main:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          # No cheap health endpoint exists on this service (/score does a real
          # FinBERT inference call) — a TCP probe is the safe option here.
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "1.5Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: finbert
spec:
  selector:
    app: finbert
  ports:
    - port: 8001
      targetPort: 8001
