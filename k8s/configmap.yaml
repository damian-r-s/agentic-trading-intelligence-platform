apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: trading
  POSTGRES_USER: trading

  BINANCE_BASE_URL: https://api.binance.com
  BINANCE_RECV_WINDOW: "5000"

  # k3s has no host.docker.internal-style alias — set this to the VM's own
  # reachable IP (e.g. the address on its primary NIC) where Ollama listens.
  OLLAMA_BASE_URL: "http://CHANGE_ME_VM_HOST_IP:11434"
  OLLAMA_MODEL: "llama3.2:3b"

  FINBERT_MODEL: ProsusAI/finbert
  FINBERT_URL: http://finbert:8001

  JWT_EXPIRY_HOURS: "8"
