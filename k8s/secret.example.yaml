# Copy this file to secret.yaml, fill in real values, then `kubectl apply -f secret.yaml`.
# secret.yaml is gitignored — never commit it.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: trading

  BINANCE_API_KEY: your_api_key
  BINANCE_API_SECRET: your_api_secret

  NEWS_API_KEY: your_newsapi_key

  JWT_SECRET_KEY: long_random_secret
  AUTH_PASSWORD_HASH: bcrypt_hash_of_your_password
