server {
    listen 80;
    server_name _;

    # Same /api -> backend, strip-prefix behavior as vite.config.ts's dev proxy
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — client-side routes (e.g. /settings) must resolve to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
